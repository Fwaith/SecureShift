previews:
  generation: automatic

databases:
  - name: secureshift-db
    databaseName: secureshift
    user: secureshift_user
    plan: free
    region: frankfurt
    ipAllowList: []

services:
  - type: web
    name: secureshift-backend
    runtime: python
    region: frankfurt
    plan: free
    rootDir: server
    buildCommand: ./build.sh
    startCommand: gunicorn secureshift.wsgi:application
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: DATABASE_URL
        fromDatabase:
          name: secureshift-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: DJANGO_SETTINGS_MODULE
        value: secureshift.settings

  - type: web
    name: secureshift-frontend
    runtime: static
    plan: free
    rootDir: client
    buildCommand: |
      npm install
      npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://secureshift-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
